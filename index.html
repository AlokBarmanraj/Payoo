<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="Images/logo.png" type="image/x-icon">

    <!-- DaisyUI CDN -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- Google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


      <!-- font-awesome CDN -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      

      <style>
        *{
            font-family: "Outfit", sans-serif;
        }
      </style>
</head>
<body>
    <!-- <header class="max-w-[450px] mx-auto bg-slate-100 "> -->
    <header class="min-h-screen max-w-md bg-base-200 mx-auto">
        <img class="w-64 pt-[210px] mx-auto" src="Images/Logo-full.png" alt="">

        <div>
            <form class="pt-9">
            <fieldset class="fieldset bg-base-100 border-base-300 rounded-2xl w-11/12 border mx-auto p-4" >

            <label class="label text-neutral font-bold text-base" for="mobile ">Mobile Number</label>
            <input id="input-number" maxlength="11" minlength="11" type="text" id="mobile " name="mobile " class="input w-full rounded-full" placeholder="Enter your number" />
            <p>01234567890</p>

            <label class="label text-neutral font-bold text-base" for="password">Password</label>
            <input id="input-password" maxlength="4" type="password" id="password" name="password" class="input w-full rounded-full" placeholder="Password" />
            <p>1234</p>

            <button type="button" id="login-btn" class="btn btn-primary mt-4 rounded-full">Login</button>
            </fieldset>
            </form>
        </div>
    </header>


    <script src="Script/login.js"></script>
</body>
</html>
