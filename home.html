<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="Images/logo.png" type="image/x-icon">

    <!-- DaisyUI CDN -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- Google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


      <!-- font-awesome CDN -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      

      <style>
        *{
            font-family: "Outfit", sans-serif;
        }
      </style>
</head>
<body>
    <header class="min-h-screen max-w-md bg-base-200 mx-auto">

        <!-- Balance Section -->
        <section class="w-11/12 flex pt-7 mx-auto items-center justify-between">
            <div class="flex">
                <img class="w-16" src="Images/logo.png" alt="">
                <div>
                    <h2 class="text-2xl font-bold">$ <span id="currant-balance">45000</span></h2>
                    <p class="text-slate-400">Available Balance</p>
                </div>
            </div>
            <div>
                <a href="index.html" class="btn btn-lg rounded-xl "><i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out</a>
            </div>
        </section>


        <!-- Welcome to Section -->
        <section class="w-11/12 mt-16 mx-auto">
            <div>
                <h2 class="text-3xl font-bold">Welcome to Pay<samp class="text-primary">oo</samp></h2>
                <br>
                <p class="text-slate-400">Enjoy easy and convenient financial services with us. Cash out charge is low and</p>
            </div>
        </section>


        <!-- Card Section -->
        <section class="w-11/12 mx-auto pt-8 grid grid-cols-3 gap-3">
            <button class="btn flex-col py-12 rounded-xl">
                <img src="Images/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
          
            <button class="btn flex-col py-12 rounded-xl">
                <img src="Images/opt-2.png" alt="">
                <p>Cash Out</p>
            </button>

            <button class="btn flex-col py-12 rounded-xl">
                <img src="Images/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl">
                <img src="Images/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl">
                <img src="Images/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex-col py-12 rounded-xl">
                <img src="Images/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </section>


        <!-- Add Money Section  -->
        <section id="add-money" class="w-11/12 mx-auto pt-6">
            <div>
                <h2 class=" text-xl font-bold">Add Money</h2>
            </div>

            <form class="pt-2">
                <fieldset class="fieldset bg-base-100 border-base-300 rounded-2xl border mx-auto p-4" >
                
                
                <label class="text-neutral font-bold text-base" for="bank">Select a Bank</label>    
                <select id="add-bank-account" class="select w-full rounded-full">
                    <option disabled selected>Add a Bank</option>
                    <option>Dutch Bangla Bank</option>
                    <option>Sonali Bank</option>
                    <option>Islami Bank</option>
                    <option>Janata Bank</option>
                </select>

                <label class="label text-neutral font-bold text-base" for="mobile ">Bank Acount Number</label>
                <input id="input-account-number" maxlength="11" minlength="11" type="text" id="mobile " name="mobile " class="input w-full rounded-full" placeholder="Enter your number" />


                <label class="label text-neutral font-bold text-base" for="amount">Amount Add</label>
                <input id="input-amount" maxlength="4" type="number" id="amount" name="amount" class="input w-full rounded-full" placeholder="Add amount" />


                <label class="label text-neutral font-bold text-base" for="password">Password</label>
                <input id="input-add-money-password" maxlength="4" type="password" id="password" name="password" class="input w-full rounded-full" placeholder="Password" />


                <button type="button" id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
                </fieldset>
            </form>
        </section>


        <!-- Cash out -->
        <section id="cash-out" class="w-11/12 mx-auto pt-6">
            <div>
                <h2 class=" text-xl font-bold">Cash Out</h2>
            </div>

            <form class="pt-2">
                <fieldset class="fieldset bg-base-100 border-base-300 rounded-2xl border mx-auto p-4" >
                

                <label class="label text-neutral font-bold text-base" for="mobile ">Agent Number</label>
                <input id="input-agent-number" maxlength="11" minlength="11" type="text" id="mobile " name="mobile " class="input w-full rounded-full" placeholder="Enter your number" />


                <label class="label text-neutral font-bold text-base" for="amount">Amount</label>
                <input id="amount" type="number" id="amount" name="amount" class="input w-full rounded-full" placeholder="Add amount" />


                <label class="label text-neutral font-bold text-base" for="password">Password</label>
                <input id="cash-out-pin" maxlength="4" type="password" id="password" name="password" class="input w-full rounded-full" placeholder="Password" />


                <button type="button" id="withdraw-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
                </fieldset>
            </form>
        </section>

    </header>


    <script src="Script/machine.js"></script>
    <script src="Script/addMoney.js"></script>
    <script src="Script/cashout-connect-machine.js"></script>
    <script src="Script/cashout.js"></script>
</body>
</html>
